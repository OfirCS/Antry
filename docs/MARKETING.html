<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Antry — Marketing notes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="doc-shell.css" />
  <style>
    .md { max-width: 720px; margin: 0 auto; padding: 0 24px 60px; }
    .md h1 { font-family: var(--font-display); font-size: 30px; font-weight: 500; letter-spacing: -0.01em; margin: 8px 0 8px; }
    .md h2 { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; margin: 36px 0 12px; padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary); }
    .md h3 { font-family: var(--font-display); font-size: 17px; font-weight: 500; margin: 24px 0 8px; }
    .md p { font-size: 14px; line-height: 1.75; color: var(--color-text-secondary); margin: 0 0 12px; }
    .md p strong, .md li strong { color: var(--color-text-primary); font-weight: 500; }
    .md em { color: var(--color-text-secondary); }
    .md blockquote { margin: 16px 0; padding: 12px 16px; border-left: 2px solid var(--color-border-secondary); background: var(--color-background-secondary); border-radius: 0 6px 6px 0; color: var(--color-text-secondary); font-size: 14px; }
    .md blockquote p { margin: 0; }
    .md ul, .md ol { padding-left: 22px; margin: 0 0 14px; }
    .md li { font-size: 14px; line-height: 1.7; color: var(--color-text-secondary); margin-bottom: 4px; }
    .md code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; background: var(--color-background-secondary); padding: 1px 6px; border-radius: 4px; color: var(--color-text-primary); }
    .md pre { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; background: var(--color-background-secondary); padding: 14px 16px; border-radius: 8px; overflow-x: auto; line-height: 1.6; }
    .md pre code { background: transparent; padding: 0; }
    .md hr { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 28px 0; }
    .md a { color: var(--color-text-primary); text-decoration: underline; text-decoration-color: var(--color-border-secondary); text-underline-offset: 3px; }
    .md a:hover { text-decoration-color: var(--color-text-primary); }
  </style>
</head>
<body>
<div class="doc-shell">
  <div class="doc-nav">
    <a class="brand" href="../index.html">Antry</a>
    <a href="../index.html#docs">← back to showcase</a>
  </div>
</div>

<div class="md" id="md"></div>

<script>
async function render() {
  const res = await fetch('MARKETING.md');
  const text = await res.text();
  document.getElementById('md').innerHTML = mdToHtml(text);
  document.title = (text.match(/^#\s+(.+)$/m) || [, 'Antry — Marketing'])[1];
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function inline(s) {
  s = s.replace(/`([^`]+)`/g, (_, c) => '<code>' + esc(c) + '</code>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
  return s;
}

function mdToHtml(text) {
  const lines = text.split('\n');
  const out = [];
  let i = 0;
  let inCode = false, codeBuf = [];
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('```')) {
      if (!inCode) { inCode = true; codeBuf = []; }
      else { inCode = false; out.push('<pre><code>' + esc(codeBuf.join('\n')) + '</code></pre>'); }
      i++; continue;
    }
    if (inCode) { codeBuf.push(line); i++; continue; }
    if (/^#{1,6}\s+/.test(line)) {
      const m = line.match(/^(#{1,6})\s+(.*)$/);
      const lvl = m[1].length;
      out.push('<h' + lvl + '>' + inline(esc(m[2])) + '</h' + lvl + '>');
      i++; continue;
    }
    if (/^---+\s*$/.test(line)) { out.push('<hr/>'); i++; continue; }
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, '')); i++; }
      out.push('<blockquote><p>' + inline(esc(buf.join(' '))) + '</p></blockquote>');
      continue;
    }
    if (/^\s*[-*]\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
        buf.push('<li>' + inline(esc(lines[i].replace(/^\s*[-*]\s+/, ''))) + '</li>');
        i++;
      }
      out.push('<ul>' + buf.join('') + '</ul>');
      continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        buf.push('<li>' + inline(esc(lines[i].replace(/^\s*\d+\.\s+/, ''))) + '</li>');
        i++;
      }
      out.push('<ol>' + buf.join('') + '</ol>');
      continue;
    }
    if (line.trim() === '') { i++; continue; }
    const buf = [];
    while (i < lines.length && lines[i].trim() !== '' && !/^(#{1,6}\s+|>\s|\s*[-*]\s+|\s*\d+\.\s+|```|---)/.test(lines[i])) {
      buf.push(lines[i]);
      i++;
    }
    out.push('<p>' + inline(esc(buf.join(' '))) + '</p>');
  }
  return out.join('\n');
}

render();
</script>

<div class="doc-shell">
  <div class="doc-footer">Antry — Marketing · Ofir Sela · 2026</div>
</div>
</body>
</html>
