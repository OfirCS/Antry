  <link rel="stylesheet" href="doc-shell.css" />
  <style>
    .md { max-width: 720px; margin: 0 auto; padding: 0 24px 60px; }
    .md h1 { font-family: var(--font-display); font-size: 30px; font-weight: 500; letter-spacing: -0.01em; margin: 8px 0 8px; }
    .md h2 { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; margin: 36px 0 12px; padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary); }
    .md h3 { font-family: var(--font-display); font-size: 17px; font-weight: 500; margin: 24px 0 8px; }
    .md p { font-size: 14px; line-height: 1.75; color: var(--color-text-secondary); margin: 0 0 12px; }
    .md p strong, .md li strong { color: var(--color-text-primary); font-weight: 500; }
    .md em { color: var(--color-text-secondary); }
    .md blockquote { margin: 16px 0; padding: 12px 16px; border-left: 2px solid var(--color-border-secondary); background: var(--color-background-secondary); border-radius: 0 6px 6px 0; color: var(--color-text-secondary); font-size: 14px; }
    .md blockquote p { margin: 0; }
    .md ul, .md ol { padding-left: 22px; margin: 0 0 14px; }
    .md li { font-size: 14px; line-height: 1.7; color: var(--color-text-secondary); margin-bottom: 4px; }
    .md code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; background: var(--color-background-secondary); padding: 1px 6px; border-radius: 4px; color: var(--color-text-primary); }
    .md pre { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; background: var(--color-background-secondary); padding: 14px 16px; border-radius: 8px; overflow-x: auto; line-height: 1.6; }
    .md pre code { background: transparent; padding: 0; }
    .md hr { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 28px 0; }
    .md a { color: var(--color-text-primary); text-decoration: underline; text-decoration-color: var(--color-border-secondary); text-underline-offset: 3px; }
    .md a:hover { text-decoration-color: var(--color-text-primary); }
  </style>
</head>
